experiment:
  name: "experiment_001"
  date: "2024-12-09"
  description: "Initial experiment with Whisper Base model on throat microphone data"

environment:
  platform: "Lambda Labs A10"
  gpu_memory: "24GB"
  python_version: "3.9"
  base_model: "openai/whisper-base"
  optimizations:
    gradient_checkpointing: true
    fp16: true

dataset:
  source: "pauljunsukhan/throatmic_codered"
  total_examples: 180
  splits:
    train: 144       # 80% of total
    test: 36         # 20% of total
  audio:
    sampling_rate: 16000
    duration: "~10 seconds"
    format: "throat microphone"

training:
  batch_size: 16
  learning_rate: 1e-5
  warmup_steps: 0
  max_steps: 1000
  evaluation:
    strategy: "steps"
    eval_steps: 100
    save_steps: 100
    save_total_limit: 3

generation:
  task: "transcribe"
  language: "english"
  temperature: 0.0
  beam_search:
    num_beams: 1

evaluation:
  primary_metric: "WER"
  baseline: 101.43
  final: 59.76
  improvement: 41.67 